name: Space Shooter

concurrency:
  group: space-shooter-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate GIF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install gh-space-shooter
          gh-space-shooter "${{ github.repository_owner }}" --output space-shooter.gif --strategy random
      - name: Commit and push with rebase retry
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add space-shooter.gif

          if git diff --staged --quiet; then
            echo "No GIF changes to commit."
            exit 0
          fi

          git commit -m "Update space shooter game GIF"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Push succeeded."
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "Push failed after retries."
          exit 1
